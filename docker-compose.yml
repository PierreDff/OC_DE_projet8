name: greencoop

services:
  # ---------------- Data warehouse ----------------
  postgres-warehouse:
    image: postgres:16-alpine
    container_name: greencoop-warehouse
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-greencoop_warehouse}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - warehouse-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - greencoop-net

  # ---------------- Admin web (optionnel) ----------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: greencoop-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - greencoop-net

volumes:
  warehouse-data:
    name: greencoop-warehouse-data
  pgadmin-data:
    name: greencoop-pgadmin-data

networks:
  greencoop-net:
    name: greencoop-net
    driver: bridge
