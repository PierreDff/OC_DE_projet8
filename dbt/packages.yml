# ============================================================
# Packages DBT - Dépendances communautaires
# ============================================================
# dbt_utils est le package utilitaire de référence dans l'écosystème DBT,
# maintenu par dbt Labs. Il fournit :
#   - generate_surrogate_key()  : génération de clés techniques par hash
#   - test_unique_combination_of_columns()  : test d'unicité composite
#   - date_spine()  : génération de calendriers (utile pour dim_date)
#   - et beaucoup d'autres macros pratiques
#
# Pour l'installer :
#   dbt deps
#
# Les packages sont téléchargés dans dbt_packages/ (gitignoré).

packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.1.1", "<2.0.0"]
